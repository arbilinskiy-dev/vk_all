services:
  backend:
    image: cr.yandex/crpq5n1men523nvih5j4/vk-planner-backend:latest
    container_name: vkplanner-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/version', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  backend_data:
