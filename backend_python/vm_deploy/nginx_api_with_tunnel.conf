server {
    server_name api.dosmmit.ru;

    # Для Let's Encrypt проверки
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # === SSH Tunnel для локальной разработки ===
    # VK шлёт callback сюда, nginx проксирует на порт 8001 (SSH reverse tunnel)
    # С локалки: ssh -R 8001:localhost:8000 yc-user@93.77.184.105
    location /api/vk/callback-local {
        rewrite ^/api/vk/callback-local(.*) /api/vk/callback$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Проксируем все запросы на Docker-контейнер с бэкендом
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.dosmmit.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dosmmit.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = api.dosmmit.ru) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.dosmmit.ru;
    return 404;
}
