server {
    server_name api.dosmmit.ru;

    # Для Let's Encrypt проверки
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # === SSH Tunnel для локальной разработки ===
    # VK шлёт callback сюда, nginx проксирует на порт 8001 (SSH reverse tunnel)
    # С локалки: ssh -R 8001:localhost:8000 yc-user@93.77.184.105
    location /api/vk/callback-local {
        rewrite ^/api/vk/callback-local(.*) /api/vk/callback$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # === DLVRY Webhook — основная обработка + зеркалирование на SSH tunnel ===
    # DLVRY шлёт сюда → nginx обрабатывает через Docker-бэкенд (8000)
    # + дополнительно зеркалирует на SSH tunnel (8001 → localhost:8000)
    # Если tunnel не активен — зеркало тихо падает, основной запрос не затрагивается.
    # URL для настройки в DLVRY: https://api.dosmmit.ru/api/dlvry/webhook
    location = /api/dlvry/webhook {
        mirror /dlvry-tunnel-mirror;
        mirror_request_body on;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Внутренний location — зеркало DLVRY вебхука на SSH tunnel
    # Отправляет копию POST-запроса на порт 8001 (reverse SSH tunnel → localhost:8000)
    location = /dlvry-tunnel-mirror {
        internal;
        proxy_pass http://127.0.0.1:8001/api/dlvry/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Source "dlvry-tunnel-mirror";
        proxy_connect_timeout 3s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    # === DLVRY Webhook — прямое проксирование на SSH tunnel (альтернатива) ===
    # Если нужно тестировать ТОЛЬКО локально (без обработки на проде):
    # URL: https://api.dosmmit.ru/api/dlvry/webhook-local
    location = /api/dlvry/webhook-local {
        proxy_pass http://127.0.0.1:8001/api/dlvry/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Проксируем все запросы на Docker-контейнер с бэкендом
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.dosmmit.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dosmmit.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = api.dosmmit.ru) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.dosmmit.ru;
    return 404;
}
